<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0F766E" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Trip Companion · 選擇行程</title>
    <script src="./storage-migration.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,800&family=Figtree:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              display: ['"Bricolage Grotesque"', "system-ui", "sans-serif"],
              sans: ['"Figtree"', "system-ui", "sans-serif"],
            },
            colors: {
              ink: { DEFAULT: "#14262B", soft: "#3E5A62", faint: "#6D848C" },
              jade: { DEFAULT: "#0F766E", soft: "#CFF0EA", deep: "#084843" },
              rose: { DEFAULT: "#E11D48", soft: "#FFE4E6", deep: "#9F1239" },
              sand: { DEFAULT: "#D97706", soft: "#FEF3C7", deep: "#B45309" },
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="./hub.css" />
  </head>
  <body class="font-sans text-ink antialiased">
    <div class="relative min-h-[100dvh] overflow-hidden">
      <div class="pointer-events-none absolute inset-0 -z-10 hub-bg"></div>
      <div class="pointer-events-none absolute -top-28 -right-16 h-72 w-72 rounded-full bg-jade-soft/70 blur-3xl"></div>
      <div class="pointer-events-none absolute bottom-10 -left-20 h-64 w-64 rounded-full bg-rose-soft/60 blur-3xl"></div>

      <main class="mx-auto flex min-h-[100dvh] max-w-lg flex-col px-5 pb-10 pt-[max(1.5rem,env(safe-area-inset-top))]">
        <header class="pt-4">
          <p class="text-[11px] font-semibold uppercase tracking-[0.24em] text-jade">
            Trip Companion
          </p>
          <h1 class="mt-2 font-display text-[2.35rem] font-extrabold leading-[1.05] tracking-tight">
            Trip<br />Companion
          </h1>
          <p class="mt-3 max-w-[20rem] text-sm leading-relaxed text-ink-soft">
            一個入口，三個行程。資料各自獨立保存在本機。
          </p>
        </header>

        <nav class="mt-8 flex flex-1 flex-col gap-3" aria-label="選擇行程">
          <a
            href="./taipei/"
            class="trip-link group relative overflow-hidden rounded-[1.75rem] bg-gradient-to-br from-jade-deep via-jade to-[#14B8A6] p-5 text-white shadow-lg shadow-jade/25 active:scale-[0.99]"
          >
            <p class="text-[11px] font-semibold uppercase tracking-[0.18em] text-white/70">Taiwan</p>
            <h2 class="mt-1 font-display text-2xl font-bold">台北長住</h2>
            <p class="mt-1 text-sm text-white/85">8/7 – 9/6 · 信義 · 永春站</p>
            <span class="mt-4 inline-flex text-sm font-bold text-white/95">進入 →</span>
          </a>

          <a
            href="./tokyo/"
            class="trip-link group relative overflow-hidden rounded-[1.75rem] bg-gradient-to-br from-rose-deep via-rose to-[#FB7185] p-5 text-white shadow-lg shadow-rose/25 active:scale-[0.99]"
          >
            <p class="text-[11px] font-semibold uppercase tracking-[0.18em] text-white/70">Japan</p>
            <h2 class="mt-1 font-display text-2xl font-bold">東京行程 Companion</h2>
            <p class="mt-1 text-sm text-white/85">8/7 – 9/6 · 原宿 · 澀谷</p>
            <span class="mt-4 inline-flex text-sm font-bold text-white/95">進入 →</span>
          </a>

          <a
            href="./thailand/"
            class="trip-link group relative overflow-hidden rounded-[1.75rem] bg-gradient-to-br from-sand-deep via-sand to-[#F59E0B] p-5 text-white shadow-lg shadow-sand/25 active:scale-[0.99]"
          >
            <p class="text-[11px] font-semibold uppercase tracking-[0.18em] text-white/70">Thailand</p>
            <h2 class="mt-1 font-display text-2xl font-bold">泰國行程 Companion</h2>
            <p class="mt-1 text-sm text-white/85">8/7 – 9/6 · 曼谷 · Phrom Phong</p>
            <span class="mt-4 inline-flex text-sm font-bold text-white/95">進入 →</span>
          </a>
        </nav>

        <p class="mt-8 text-center text-xs text-ink-faint">
          台北 · 東京 · 泰國各自使用獨立 localStorage
        </p>
      </main>
    </div>
  </body>
</html>
