<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#D97706" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>泰國 Companion · Trip Companion</title>
    <script src="../storage-migration.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,800&family=Figtree:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              display: ['"Bricolage Grotesque"', "system-ui", "sans-serif"],
              sans: ['"Figtree"', "system-ui", "sans-serif"],
            },
            colors: {
              ink: { DEFAULT: "#1C1917", soft: "#57534E", faint: "#78716C" },
              sand: { DEFAULT: "#D97706", soft: "#FEF3C7", deep: "#B45309" },
              sea: { DEFAULT: "#0E7490", soft: "#CFFAFE" },
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="font-sans text-ink antialiased">
    <div class="relative min-h-[100dvh] overflow-hidden">
      <div class="pointer-events-none absolute inset-0 -z-10 thai-bg"></div>

      <header class="safe-top px-5 pt-5 pb-3">
        <div class="mx-auto max-w-lg">
          <a href="../" class="inline-flex min-h-9 items-center text-xs font-semibold text-sand-deep">
            ← 全部行程
          </a>
          <p class="mt-2 text-[11px] font-semibold uppercase tracking-[0.22em] text-sand">
            Trip Companion · Thailand
          </p>
          <h1 class="mt-1 font-display text-[1.85rem] font-extrabold leading-tight">
            泰國行程
          </h1>
          <p class="mt-1 text-sm text-ink-soft">與台北長住、東京行程 Companion 並列 · 內容可持續擴充</p>
        </div>
      </header>

      <main class="mx-auto max-w-lg space-y-4 px-4 pb-10">
        <section class="overflow-hidden rounded-3xl bg-gradient-to-br from-sand-deep via-sand to-[#F59E0B] p-5 text-white shadow-lg">
          <p class="text-xs text-white/75">Coming into focus</p>
          <h2 class="mt-1 font-display text-2xl font-bold">骨架已就緒</h2>
          <p class="mt-2 text-sm text-white/85">
            之後可在此加入行程週次、清單、Cafe Log 與泰銖／港幣開支儀表板，資料會獨立存在
            <code class="rounded bg-white/15 px-1">thailand-*</code> localStorage keys。
          </p>
        </section>

        <section class="rounded-3xl bg-white/85 p-4 shadow-md">
          <h3 class="font-display text-sm font-bold">預留分頁</h3>
          <ul class="mt-3 grid grid-cols-2 gap-2 text-sm">
            <li class="rounded-2xl bg-sand-soft px-3 py-3 font-semibold text-sand-deep">行程</li>
            <li class="rounded-2xl bg-sand-soft px-3 py-3 font-semibold text-sand-deep">清單</li>
            <li class="rounded-2xl bg-sea-soft px-3 py-3 font-semibold text-sea-DEFAULT">Cafe Log</li>
            <li class="rounded-2xl bg-sea-soft px-3 py-3 font-semibold text-sea-DEFAULT">開支</li>
          </ul>
        </section>

        <p class="px-1 text-center text-xs text-ink-faint">
          選擇上方「全部行程」可回到台北／東京／泰國入口。
        </p>
      </main>
    </div>
  </body>
</html>
